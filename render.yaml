services:
  - type: web
    name: messaging-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: APP_NAME
        value: Message-Me
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: sqlite
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: BROADCAST_CONNECTION
        value: reverb
      - key: FILESYSTEM_DISK
        value: public
      - key: REVERB_APP_ID
        value: "1001"
      - key: REVERB_APP_KEY
        value: laravel-reverb-key
      - key: REVERB_APP_SECRET
        generateValue: true
      - key: REVERB_HOST
        sync: false
      - key: REVERB_SERVER_HOST
        value: 0.0.0.0
      - key: REVERB_PORT
        value: "8080"
      - key: REVERB_SCHEME
        value: https
      - key: VITE_APP_NAME
        value: Message-Me
      - key: VITE_REVERB_APP_KEY
        value: laravel-reverb-key
      - key: VITE_REVERB_HOST
        sync: false
      - key: VITE_REVERB_PORT
        value: "443"
      - key: VITE_REVERB_SCHEME
        value: https
