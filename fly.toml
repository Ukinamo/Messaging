app = 'messaging-app'
primary_region = 'sjc'

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[services]]
  protocol = "tcp"
  internal_port = 8080

  [[services.ports]]
    port = 8080
    handlers = ["tls", "http"]

[env]
  APP_NAME = "Message-Me"
  APP_ENV = "production"
  APP_DEBUG = "false"
  DB_CONNECTION = "sqlite"
  SESSION_DRIVER = "file"
  CACHE_STORE = "file"
  QUEUE_CONNECTION = "sync"
  BROADCAST_CONNECTION = "reverb"
  FILESYSTEM_DISK = "public"
  REVERB_APP_ID = "1001"
  REVERB_APP_KEY = "laravel-reverb-key"
  REVERB_SERVER_HOST = "0.0.0.0"
  REVERB_PORT = "8080"
  REVERB_SCHEME = "https"
  VITE_APP_NAME = "Message-Me"
  VITE_REVERB_APP_KEY = "laravel-reverb-key"
  VITE_REVERB_PORT = "8080"
  VITE_REVERB_SCHEME = "https"

[mounts]
  source = "data"
  destination = "/app/storage"
